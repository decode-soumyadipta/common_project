name: offline-3d-gis-desktop
version: 0.1.0
company: Offline GIS
installer_type: exe
initialize_by_default: false
register_python: false
channels:
  - conda-forge
specs:
  - python 3.11*
  - pip
  - numpy
  - fastapi
  - uvicorn
  - sqlalchemy
  - psycopg
  - pydantic-settings
  - rasterio
  - pyproj
  - httpx
  - pyside6 >=6.7,<7.0
  - pyside6-addons >=6.7,<7.0
  - qtawesome >=1.3,<2.0
post_install: post_install.bat
extra_files:
  - payload/wheels
default_prefix: "%USERPROFILE%\\offline-3d-gis"
welcome_file: welcome.txt
readme_file: readme.txt
conclusion_file: conclusion.txt
