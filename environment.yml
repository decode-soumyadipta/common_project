name: offline-3d-gis
channels:
  - conda-forge
  - defaults
dependencies:
  # --- Core Python ---
  - python=3.11
  - pip

  # --- Geo/Raster stack ---
  - numpy
  - rasterio
  - pyproj
  - proj
  - geos
  - gdal

  # --- Spatial/DB ---
  - sqlalchemy
  - psycopg
  - shapely

  # --- Web server ---
  - fastapi
  - uvicorn      # NOTE: no uvloop on Windows; uvicorn uses asyncio fallback
  - httpx
  - httpcore
  - starlette
  - pydantic
  - pydantic-settings
  - python-multipart
  - python-dotenv
  - websockets
  - watchfiles

  # --- Utilities ---
  - click
  - typer
  - rich
  - pyyaml
  - jinja2
  - packaging
  - certifi
  - openssl
  - colorama

  # --- Testing ---
  - pytest

  - pip:
    - cogeo-mosaic
    - color-operations
    - cramjam
    - geojson-pydantic
    - morecantile
    - numexpr
    - pystac
    - rio-cogeo
    - rio-stac
    - rio-tiler
    - titiler-application
    - titiler-core
    - titiler-extensions
    - titiler-mosaic
    - starlette-cramjam
    - supermorecado
    - pyqt5
    - pyside6
    - qtawesome
    - qtpy
    - requests
    - shapely
    - simplejson
    - ruff
    - opentelemetry-api
    - opentelemetry-sdk
    - opentelemetry-exporter-otlp
    - opentelemetry-instrumentation-fastapi
    - psycopg-binary
    - offline-3d-gis-app