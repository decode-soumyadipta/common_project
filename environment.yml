name: offline-3d-gis
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - fastapi
  - uvicorn
  - sqlalchemy
  - psycopg
  - pydantic-settings
  - rasterio=1.4.3
  - pyproj
  - shapely=2.0.7
  - pytest
  - httpx
  - pip:
      - PyQt5>=5.15,<6.0
      - PyQtWebEngine>=5.15,<6.0
      - qtpy>=2.4,<3.0
      - qtawesome>=1.3,<2.0
      - titiler.application>=0.21,<1.0
      - -e .
