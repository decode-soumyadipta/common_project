name: offline-3d-gis
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # Keep heavy geo/native libs in conda for better cross-platform reliability.
  - rasterio=1.4.3
  - pyproj
  - shapely=2.0.7
  - pip:
      # Pull app + desktop + dev dependencies from pyproject.toml.
      - -e .[desktop,dev]
